<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background matching website logo -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGradient)"/>

  <!-- Swords icon - exact match to Lucide Swords -->
  <g fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">

    <!-- Sword 1 blade (top-left to bottom-right) -->
    <path d="M112 112 L400 400"/>

    <!-- Sword 1 handle circle -->
    <circle cx="112" cy="112" r="36"/>

    <!-- Sword 1 guard (cross guard) -->
    <path d="M80 144 L144 144"/>

    <!-- Sword 2 blade (top-right to bottom-left) -->
    <path d="M400 112 L112 400"/>

    <!-- Sword 2 handle circle -->
    <circle cx="400" cy="112" r="36"/>

    <!-- Sword 2 guard (cross guard) -->
    <path d="M368 144 L432 144"/>

  </g>
</svg>
