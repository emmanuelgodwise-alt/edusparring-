<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="swordGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="swordGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="#1e1b4b" stroke="#312e81" stroke-width="4"/>
  
  <!-- First Sword (top-left to bottom-right) -->
  <g filter="url(#glow)">
    <path d="M100 75 L330 305 L310 325 L80 95 Z" fill="url(#swordGrad1)" stroke="#ffffff" stroke-width="3"/>
    <circle cx="75" cy="75" r="25" fill="#fbbf24" stroke="#ffffff" stroke-width="3"/>
    <rect x="62" y="108" width="26" height="65" rx="6" fill="#6b7280"/>
    <rect x="57" y="97" width="36" height="15" rx="4" fill="#9ca3af"/>
  </g>
  
  <!-- Second Sword (top-right to bottom-left) -->
  <g filter="url(#glow)">
    <path d="M412 75 L182 305 L202 325 L432 95 Z" fill="url(#swordGrad2)" stroke="#ffffff" stroke-width="3"/>
    <circle cx="437" cy="75" r="25" fill="#fbbf24" stroke="#ffffff" stroke-width="3"/>
    <rect x="424" y="108" width="26" height="65" rx="6" fill="#6b7280"/>
    <rect x="419" y="97" width="36" height="15" rx="4" fill="#9ca3af"/>
  </g>
  
  <!-- Clash spark in center -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="30" fill="#fbbf24"/>
    <circle cx="256" cy="256" r="15" fill="#ffffff"/>
  </g>
</svg>