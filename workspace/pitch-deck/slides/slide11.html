<!DOCTYPE html>
<html><head><style>
html { background: #193328; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; background: #193328; }
.header { padding: 25pt 40pt 15pt 40pt; }
.header-title { font-size: 28pt; font-weight: bold; color: #FFFFFF; margin: 0; }
.content { flex: 1; padding: 10pt 40pt 30pt 40pt; display: flex; gap: 30pt; }
.ask-main { flex: 1; background: #0D1F1A; border-radius: 10pt; padding: 30pt; text-align: center; display: flex; flex-direction: column; justify-content: center; }
.ask-amount { font-size: 48pt; font-weight: bold; color: #37DCF2; margin: 0; }
.ask-label { font-size: 16pt; color: #FFFFFF; margin: 10pt 0 0 0; }
.use-col { flex: 1; }
.use-title { font-size: 16pt; font-weight: bold; color: #37DCF2; margin: 0 0 18pt 0; }
.use-item { display: flex; align-items: center; margin-bottom: 15pt; }
.use-percent { font-size: 16pt; font-weight: bold; color: #37DCF2; width: 50pt; margin: 0; }
.use-desc { font-size: 12pt; color: #FFFFFF; margin: 0; }
</style></head>
<body>
<div class="header">
<h1 class="header-title">Investment Opportunity</h1>
</div>
<div class="content">
<div class="ask-main">
<p class="ask-amount">$2.5M</p>
<p class="ask-label">Seed Round</p>
</div>
<div class="use-col">
<h3 class="use-title">Use of Funds</h3>
<div class="use-item">
<p class="use-percent">40%</p>
<p class="use-desc">Product Development and AI</p>
</div>
<div class="use-item">
<p class="use-percent">30%</p>
<p class="use-desc">Marketing and User Acquisition</p>
</div>
<div class="use-item">
<p class="use-percent">20%</p>
<p class="use-desc">Team Expansion</p>
</div>
<div class="use-item">
<p class="use-percent">10%</p>
<p class="use-desc">Operations and Infrastructure</p>
</div>
</div>
</div>
</body></html>
