<!DOCTYPE html>
<html><head><style>
html { background: #193328; }
body { width: 720pt; height: 405pt; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; background: #193328; }
.header { padding: 15pt 40pt 8pt 40pt; }
.header-title { font-size: 26pt; font-weight: bold; color: #FFFFFF; margin: 0; }
.content { flex: 1; padding: 8pt 40pt 20pt 40pt; display: flex; justify-content: center; align-items: center; }
.flywheel { display: flex; flex-direction: column; align-items: center; gap: 6pt; }
.fw-item { background: #0D1F1A; border-radius: 5pt; padding: 8pt 25pt; text-align: center; }
.fw-text { font-size: 11pt; color: #FFFFFF; margin: 0; }
.fw-arrow { font-size: 14pt; color: #37DCF2; margin: 0; }
.fw-item.highlight { background: #37DCF2; }
.fw-item.highlight .fw-text { color: #193328; font-weight: bold; }
</style></head>
<body>
<div class="header">
<h1 class="header-title">Growth Flywheel</h1>
</div>
<div class="content">
<div class="flywheel">
<div class="fw-item"><p class="fw-text">Sparring Highlights Go Viral</p></div>
<p class="fw-arrow">↓</p>
<div class="fw-item"><p class="fw-text">New Users Join Platform</p></div>
<p class="fw-arrow">↓</p>
<div class="fw-item"><p class="fw-text">Seasonal Leagues Create Addiction</p></div>
<p class="fw-arrow">↓</p>
<div class="fw-item"><p class="fw-text">Tournaments Drive Spectators</p></div>
<p class="fw-arrow">↓</p>
<div class="fw-item highlight"><p class="fw-text">Community Growth = More Highlights</p></div>
</div>
</div>
</body></html>
